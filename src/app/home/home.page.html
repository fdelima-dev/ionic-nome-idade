<ion-header>
  <ion-toolbar>
    <ion-title>Nome Idade</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-item>
    <ion-label position="stacked">Nome</ion-label>
    <ion-input type="text" [(ngModel)]="nome"></ion-input>
  </ion-item>
  <ion-item>
    <ion-label position="stacked">Idade</ion-label>
    <ion-input type="number" [(ngModel)]="idade"></ion-input>
  </ion-item>
  <ion-button (click)="mostrar()">Mostrar</ion-button>

  <h2>{{ resultado }}</h2>
</ion-content>
